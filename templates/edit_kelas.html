<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Kelas - Sistem Absensi</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container { max-width: 500px; }
        .card {
            border: none;
            border-radius: 1.5rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        .card-header {
            background: var(--primary-gradient);
            color: white;
            padding: 2rem;
            text-align: center;
            border-bottom: none;
        }
        .card-body { padding: 2.5rem; background: white; }
        .form-label { font-weight: 600; color: #475569; }
        .form-control, .form-select { border-radius: 0.75rem; padding: 0.75rem 1rem; border: 1px solid #e2e8f0; }
        .btn-primary { background: var(--primary-gradient); border: none; border-radius: 0.75rem; padding: 0.8rem; font-weight: 600; }
        .btn-light { background-color: #f1f5f9; border-radius: 0.75rem; padding: 0.8rem; font-weight: 600; color: #475569; text-decoration: none; display: block; text-align: center; }
    </style>
</head>
<body>

    <div class="container py-5">
        <div class="card shadow-lg">
            <div class="card-header">
                <i class="fas fa-edit fs-1 mb-3"></i>
                <h2 class="h4 fw-bold mb-0">Edit Data Kelas</h2>
                <p class="small text-white-50 mt-2 mb-0">Perbarui informasi kelas dan wali kelas</p>
            </div>
            <div class="card-body">
                <form action="{{ url_for('edit_kelas', id=class_data.id) }}" method="POST">
                    <div class="mb-3">
                        <label for="name" class="form-label">Nama Kelas</label>
                        <input type="text" class="form-control" id="name" name="name" value="{{ class_data.name }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="level" class="form-label">Tingkat</label>
                        <input type="number" class="form-control" id="level" name="level" value="{{ class_data.level }}" required>
                    </div>

                    <div class="mb-4">
                        <label for="homeroom_teacher_id" class="form-label">Wali Kelas</label>
                        <select class="form-select" id="homeroom_teacher_id" name="homeroom_teacher_id">
                            <option value="" {% if not class_data.homeroom_teacher_id %}selected{% endif %}>-- Pilih Wali Kelas (Opsional) --</option>
                            {% for teacher in teachers %}
                                <option value="{{ teacher.id }}" {% if class_data.homeroom_teacher_id == teacher.id %}selected{% endif %}>
                                    {{ teacher.name }} (NIP: {{ teacher.nip }})
                                </option>
                            {% endfor %}
                        </select>
                        <div class="form-text mt-2 text-muted small">Wali kelas harus sudah terdaftar di menu Guru.</div>
                    </div>

                    <div class="d-grid gap-3 mt-4">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save me-2"></i> Simpan Perubahan
                        </button>
                        <a href="{{ url_for('dashboard') }}" class="btn btn-light">
                            <i class="fas fa-times me-2"></i> Batal
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>

</body>
</html>
