<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Hafalan - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .segmented-btn input:checked + label { background-color: #4f46e5; color: white; }
    </style>
</head>
<body class="p-4 md:p-8 flex items-center justify-center min-h-screen">
    <div class="max-w-xl w-full bg-white p-8 rounded-3xl shadow-xl border border-slate-100">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-bold text-slate-900 flex items-center gap-3">
                <i class="fas fa-edit text-indigo-600"></i>
                Edit Hafalan
            </h1>
            <a href="{{ url_for('input_hafalan', student_id=hafalan.student_id) }}" class="text-slate-400 hover:text-slate-600 transition">
                <i class="fas fa-times fa-lg"></i>
            </a>
        </div>

        <form action="{{ url_for('edit_hafalan', hafalan_id=hafalan.id) }}" method="POST" class="space-y-6">
            <!-- Type -->
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">Jenis Hafalan</label>
                <div class="flex p-1 bg-slate-100 rounded-xl gap-1 segmented-btn">
                    <input type="radio" name="type" value="hafalan_baru" id="type_baru" class="hidden" {% if hafalan.type == 'hafalan_baru' %}checked{% endif %}>
                    <label for="type_baru" class="flex-1 text-center py-2.5 text-sm font-semibold rounded-lg cursor-pointer transition text-slate-600 hover:bg-white/50">Baru</label>
                    
                    <input type="radio" name="type" value="murojaah" id="type_murojaah" class="hidden" {% if hafalan.type == 'murojaah' %}checked{% endif %}>
                    <label for="type_murojaah" class="flex-1 text-center py-2.5 text-sm font-semibold rounded-lg cursor-pointer transition text-slate-600 hover:bg-white/50">Murojaah</label>
                    
                    <input type="radio" name="type" value="robert" id="type_robert" class="hidden" {% if hafalan.type == 'robert' %}checked{% endif %}>
                    <label for="type_robert" class="flex-1 text-center py-2.5 text-sm font-semibold rounded-lg cursor-pointer transition text-slate-600 hover:bg-white/50">Robert</label>
                </div>
            </div>

            <!-- Surah -->
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Nama Surah</label>
                <input type="text" name="surah" value="{{ hafalan.surah }}" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none" required>
            </div>

            <!-- Ayats -->
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Ayat Awal</label>
                    <input type="number" name="ayat_awal" value="{{ hafalan.ayat_start }}" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none" required>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Ayat Akhir</label>
                    <input type="number" name="ayat_akhir" value="{{ hafalan.ayat_end }}" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none" required>
                </div>
            </div>

            <!-- Pages -->
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Jumlah Halaman</label>
                <input type="number" name="pages_count" value="{{ hafalan.pages_count }}" min="1" step="1" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none" required>
            </div>

            <!-- Kualitas -->
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Kualitas</label>
                <select name="kualitas" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none">
                    <option value="Lancar" {% if hafalan.kualitas == 'Lancar' %}selected{% endif %}>🟢 Lancar</option>
                    <option value="Cukup" {% if hafalan.kualitas == 'Cukup' %}selected{% endif %}>🟡 Cukup</option>
                    <option value="Perlu Mengulang" {% if hafalan.kualitas == 'Perlu Mengulang' %}selected{% endif %}>🔴 Perlu Mengulang</option>
                </select>
            </div>

            <!-- Notes -->
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Catatan</label>
                <textarea name="keterangan" rows="3" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none">{{ hafalan.note }}</textarea>
            </div>

            <!-- Buttons -->
            <div class="flex gap-4 pt-4">
                <a href="{{ url_for('input_hafalan', student_id=hafalan.student_id) }}" class="flex-1 py-4 text-center text-slate-500 font-bold border border-slate-200 rounded-2xl hover:bg-slate-50 transition">
                    Batal
                </a>
                <button type="submit" class="flex-1 py-4 bg-indigo-600 text-white rounded-2xl font-bold hover:bg-indigo-700 transition shadow-lg shadow-indigo-100">
                    Update Hafalan
                </button>
            </div>
        </form>
    </div>
</body>
</html>
