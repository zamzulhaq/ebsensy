{% extends "base.html" %}

{% block title %}Ganti Password - E-Absensi & Tahfidz{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-slate-50 to-slate-100">
    <div class="bg-white w-full max-w-md rounded-[2rem] shadow-xl border border-slate-100 p-8">
        
        <!-- Header -->
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-amber-100 text-amber-600 rounded-full mx-auto flex items-center justify-center mb-4">
                <i class="fas fa-shield-alt text-2xl"></i>
            </div>
            <h1 class="text-2xl font-bold text-slate-800">Wajib Ganti Password</h1>
            <p class="text-sm text-slate-500 mt-2 font-medium">Demi keamanan, silakan buat password baru sebelum melanjutkan.</p>
        </div>

        <!-- Form -->
        <form method="POST" action="{{ url_for('auth.change_password') }}" class="space-y-4">
            <!-- Password Lama -->
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-1.5 ml-1">Password Lama / Default</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                        <i class="fas fa-unlock text-slate-400 text-sm"></i>
                    </div>
                    <input type="password" name="old_password" required
                        class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition-all text-sm font-medium"
                        placeholder="Masukkan password saat ini">
                </div>
            </div>

            <!-- Password Baru -->
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-1.5 ml-1">Password Baru</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                        <i class="fas fa-key text-slate-400 text-sm"></i>
                    </div>
                    <input type="password" name="new_password" required minlength="6"
                        class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition-all text-sm font-medium"
                        placeholder="Minimal 6 karakter">
                </div>
            </div>

            <!-- Konfirmasi Password -->
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-1.5 ml-1">Konfirmasi Password Baru</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                        <i class="fas fa-check-double text-slate-400 text-sm"></i>
                    </div>
                    <input type="password" name="confirm_password" required minlength="6"
                        class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition-all text-sm font-medium"
                        placeholder="Ketik ulang password baru">
                </div>
            </div>

            <!-- Button -->
            <button type="submit" 
                class="w-full mt-4 bg-slate-800 hover:bg-slate-900 text-white font-bold py-3.5 rounded-xl shadow-lg hover:shadow-xl transition-all flex items-center justify-center gap-2">
                <i class="fas fa-save"></i>
                <span>Simpan Password & Lanjutkan</span>
            </button>
        </form>

    </div>
</div>
{% endblock %}
