{% extends 'base.html' %}

{% block title %}Tambah Wali Murid{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto px-4 py-8 md:py-12">
    <div class="mb-8">
        <a href="{{ url_for('wali.list_wali') }}" class="inline-flex items-center gap-2 text-slate-500 hover:text-emerald-600 font-bold text-sm mb-6 transition-colors">
            <i class="fas fa-arrow-left"></i> Kembali ke Daftar Wali
        </a>
        <h1 class="text-3xl font-black text-slate-900 tracking-tight">Tambah Wali Murid</h1>
        <p class="text-slate-500 font-medium mt-2">Akun wali dibuat oleh admin sekolah dan langsung dihubungkan ke siswa.</p>
    </div>

    <div class="desktop-card overflow-hidden">
        <div class="p-8 text-center" style="background:linear-gradient(135deg,#059669,#047857)">
            <div style="width:60px;height:60px;background:rgba(255,255,255,.2);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px">
                <i class="fas fa-user-group text-white text-2xl"></i>
            </div>
            <h2 class="text-xl font-extrabold text-white">Data Akun Wali</h2>
            <p class="text-sm" style="color:rgba(255,255,255,.8)">Isi data login dan relasi siswa.</p>
        </div>

        <form action="{{ url_for('wali.create_wali') }}" method="POST" class="p-8 space-y-6">
            <div>
                <label class="block text-xs font-bold uppercase tracking-widest mb-2" style="color:#78716C">Nama Wali</label>
                <div class="relative">
                    <i class="fas fa-user absolute left-3.5 top-1/2 -translate-y-1/2 text-sm" style="color:#A8A29E"></i>
                    <input type="text" name="full_name" required class="d-input pl-10" placeholder="Nama lengkap wali">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest mb-2" style="color:#78716C">Email</label>
                    <div class="relative">
                        <i class="fas fa-envelope absolute left-3.5 top-1/2 -translate-y-1/2 text-sm" style="color:#A8A29E"></i>
                        <input type="email" name="email" required class="d-input pl-10" placeholder="wali@email.com">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest mb-2" style="color:#78716C">Password</label>
                    <div class="relative">
                        <i class="fas fa-lock absolute left-3.5 top-1/2 -translate-y-1/2 text-sm" style="color:#A8A29E"></i>
                        <input type="password" name="password" required minlength="6" class="d-input pl-10" placeholder="Minimal 6 karakter">
                    </div>
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold uppercase tracking-widest mb-2" style="color:#78716C">Nomor HP</label>
                <div class="relative">
                    <i class="fas fa-phone absolute left-3.5 top-1/2 -translate-y-1/2 text-sm" style="color:#A8A29E"></i>
                    <input type="tel" name="phone_number" required class="d-input pl-10" placeholder="08xxxxxxxxxx">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest mb-2" style="color:#78716C">Pilih Siswa</label>
                    <div class="relative">
                        <i class="fas fa-user-graduate absolute left-3.5 top-1/2 -translate-y-1/2 text-sm" style="color:#A8A29E"></i>
                        <select name="student_id" required class="d-input pl-10" style="appearance:none">
                            <option value="">Pilih siswa</option>
                            {% for student in students %}
                                <option value="{{ student.id }}">{{ student.name or student.id }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest mb-2" style="color:#78716C">Relationship</label>
                    <div class="relative">
                        <i class="fas fa-link absolute left-3.5 top-1/2 -translate-y-1/2 text-sm" style="color:#A8A29E"></i>
                        <select name="relationship" required class="d-input pl-10" style="appearance:none">
                            <option value="">Pilih hubungan</option>
                            <option value="ayah">Ayah</option>
                            <option value="ibu">Ibu</option>
                            <option value="wali">Wali</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="flex gap-3 pt-4 border-t border-stone-100">
                <button type="submit" class="d-btn-primary flex-1 justify-center py-3" style="background:#059669">
                    <i class="fas fa-save"></i> Simpan Akun Wali
                </button>
                <a href="{{ url_for('wali.list_wali') }}" class="d-btn-secondary px-8">Batal</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
