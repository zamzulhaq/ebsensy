{% extends 'base.html' %}

{% block title %}{{ 'Edit' if mode == 'edit' else 'Buat' }} Ujian Tahfidz{% endblock %}

{% block content %}
<div class="min-h-screen bg-slate-50 flex items-center justify-center p-6 py-12">
    <div class="max-w-xl w-full">
        <div class="bg-white rounded-[2.5rem] shadow-2xl shadow-slate-200/50 border border-slate-100 overflow-hidden">
            <!-- Header -->
            <div class="bg-emerald-600 p-10 text-center relative overflow-hidden">
                <div class="absolute -top-10 -right-10 w-32 h-32 bg-white/10 rounded-full"></div>
                <div class="w-16 h-16 bg-white/20 rounded-2xl flex items-center justify-center text-white text-2xl mx-auto mb-4 relative z-10">
                    <i class="fas fa-file-signature"></i>
                </div>
                <h2 class="text-2xl font-black text-white relative z-10">{{ 'Edit Jadwal Ujian' if mode == 'edit' else 'Buat Ujian Baru' }}</h2>
                <p class="text-emerald-100 text-sm font-medium relative z-10">Ujian Munaqosyah / Tasmi' Halaqoh</p>
            </div>

            <!-- Form -->
            <form action="{{ url_for('halaqoh.edit_exam', exam_id=exam.id) if mode == 'edit' else url_for('halaqoh.create_exam') }}" method="POST" class="p-10 space-y-6">
                
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-1">Nama / Judul Ujian</label>
                    <input type="text" name="title" value="{{ exam.title if exam else '' }}" required class="w-full px-5 py-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 font-bold text-slate-700 transition" placeholder="Contoh: Munaqosyah Juz 30">
                </div>

                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-1">Jenis Ujian</label>
                        <select name="exam_type_id" required class="w-full px-5 py-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 font-bold text-slate-700 appearance-none transition">
                            <option value="">Pilih Jenis</option>
                            {% for type in exam_types %}
                            <option value="{{ type.id }}" {% if exam and exam.exam_type_id == type.id %}selected{% endif %}>{{ type.name }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-1">Grup Halaqoh</label>
                        <select name="halaqoh_id" required class="w-full px-5 py-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 font-bold text-slate-700 appearance-none transition">
                            <option value="">Pilih Halaqoh</option>
                            {% for h in halaqohs %}
                            <option value="{{ h.id }}" {% if exam and exam.halaqoh_id == h.id %}selected{% endif %}>{{ h.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-1">Semester</label>
                        <select name="semester" required class="w-full px-5 py-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 font-bold text-slate-700 appearance-none transition">
                            <option value="1" {% if exam and exam.semester == 1 %}selected{% endif %}>Ganjil (1)</option>
                            <option value="2" {% if exam and exam.semester == 2 %}selected{% endif %}>Genap (2)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-1">Tahun Ajaran</label>
                        <input type="text" name="academic_year" value="{{ exam.academic_year if exam else '2023/2024' }}" required class="w-full px-5 py-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 font-bold text-slate-700 transition" placeholder="YYYY/YYYY">
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-1">Tanggal Ujian</label>
                    <input type="date" name="exam_date" value="{{ exam.exam_date if exam else '' }}" required class="w-full px-5 py-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 font-bold text-slate-700 transition">
                </div>

                <div class="flex gap-4 pt-6">
                    <button type="submit" class="flex-1 py-4 bg-emerald-600 text-white font-black rounded-2xl shadow-xl shadow-emerald-500/20 hover:bg-emerald-700 transition-all flex items-center justify-center gap-2">
                        <i class="fas fa-save"></i> {{ 'Simpan Perubahan' if mode == 'edit' else 'Buat Ujian' }}
                    </button>
                    <a href="{{ url_for('halaqoh.list_exams') }}" class="px-8 py-4 bg-slate-100 text-slate-600 rounded-2xl font-bold hover:bg-slate-200 transition-all flex items-center justify-center">
                        Batal
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
